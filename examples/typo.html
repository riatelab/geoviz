<script type="module">
  import * as geoviz from "https://cdn.jsdelivr.net/npm/geoviz/+esm";
  import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
  let geojson = "./world.json";

  d3.json(geojson).then((data) => {
    let svg = geoviz.create({ projection: "EqualEarth" });
    svg.plot({ type: "outline" });
    svg.plot({ type: "graticule", stroke: "white", strokeWidth: 0.4 });
    svg.plot({
      type: "typo",
      data: data,
      var: "region",
      colors: "Set3",
      tip: "$NAMEen ($region)",
      leg_pos: [670, 300],
      leg_title: "Continents",
      alphabetical: true,
    });
    svg.header({
      fontSize: 30,
      text: "A Typo World Map",
      fill: "#267A8A",
      fontWeight: "bold",
    });
    document.body.appendChild(svg.render());
  });
</script>
