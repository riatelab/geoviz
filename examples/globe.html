<script type="module">
  import * as geoviz from "https://cdn.jsdelivr.net/npm/geoviz/+esm";
  import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
  let geojson = "./world.json";
  d3.json(geojson).then((data) => {
    let svg = geoviz.create({
      projection: "Orthographic.rotate([-30,-30])",
      zoomable: "versor",
      width: 500,
    });
    svg.outline();
    svg.graticule({ stroke: "white", strokeWidth: 0.4 });
    svg.path({ datum: data, fill: "white", fillOpacity: 0.4 });
    svg.plot({
      type: "prop",
      data: data,
      var: "pop",
      k: 40,
      fill: "#f07d75",
      tip: "$NAMEen",
      legend: false,
    });
    svg.header({
      fontSize: 30,
      text: "A Globe",
      fill: "#267A8A",
      fontWeight: "bold",
    });
    document.body.appendChild(svg.render());
  });
</script>
