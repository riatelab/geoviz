<head>
  <meta charset="UTF-8" />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css?family=Tangerine"
  />
</head>

<body>
  <div id="map"></div>
</body>

<script type="module">
  import * as geoviz from "https://cdn.jsdelivr.net/npm/geoviz/+esm";
  import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
  let geojson = "./world.json";
  d3.json(geojson).then((data) => {
    let svg = geoviz.create({ projection: "EqualEarth" });
    svg.outline({ fill: "#267A8A" });
    svg.graticule({ stroke: "white", strokeWidth: 0.4 });
    svg.path({
      data: data,
      fill: "#F8D993",
      stroke: "#ada9a6",
      strokeWidth: 0.5,
      tip: "$NAMEen",
    });
    svg.header({
      fontSize: 30,
      text: "A Simple World Map",
      fill: "#267A8A",
      fontWeight: "bold",
      fontFamily: "Tangerine",
    });
    document.getElementById("map").appendChild(svg.render());
  });
</script>
